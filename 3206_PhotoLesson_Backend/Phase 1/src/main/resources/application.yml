spring:
  datasource:
    url: jdbc:mysql://localhost:3306/photolesson?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: photolesson-secret-key-for-jwt-token-generation-must-be-at-least-256-bits
  expiration: 1800000
  refresh-expiration: 604800000

server:
  port: 8080

file:
  upload-dir: uploads
