spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:3306/photolesson?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:photolesson-prod-secret-key-for-jwt-token-generation-must-be-at-least-256-bits-long}
  expiration: 7200000
  refresh-expiration: 604800000

server:
  port: 8080

file:
  upload-dir: /home/ec2-user/photolesson/uploads

toss:
  client-key: ${TOSS_CLIENT_KEY:test_ck_test}
  secret-key: ${TOSS_SECRET_KEY:test_sk_test}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.photolesson.backend: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
